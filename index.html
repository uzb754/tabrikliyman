<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabriknoma | Intizor Opa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --light-gold: #f3e5ab;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--light-gold);
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Konteyner animatsiyasi - Sekin suzib chiqish */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 50px 20px;
            margin: 40px 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            animation: fadeInUp 1.5s ease-out; /* Sarlavha va konteyner suzib chiqadi */
        }

        /* 1. Dumaloq profil va aylanuvchi tilla hoshiya */
        .profile-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--gold);
            border-bottom-color: var(--gold);
            animation: rotateRing 4s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-wrapper {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            z-index: 2;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .profile-wrapper:hover .profile-img {
            transform: scale(1.1);
        }

        /* Sarlavhalar dizayni */
        h1 {
            font-size: clamp(35px, 8vw, 70px);
            font-style: italic;
            color: var(--gold);
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            letter-spacing: 4px;
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .main-wish {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #fff;
            min-height: 100px;
        }

        /* Kartochkalar */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            padding: 25px;
            border-radius: 15px;
            transition: 0.4s;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            background: rgba(212, 175, 55, 0.05);
        }

        /* Tugmalar */
        .btn-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 15px 35px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 50px;
            flex: 1;
            min-width: 180px;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px var(--gold);
        }

        .btn-heart {
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .btn-heart:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 20px #ff4d4d;
        }

        @media (max-width: 600px) {
            .profile-container { width: 200px; height: 200px; }
            .profile-wrapper { width: 185px; height: 185px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <p style="letter-spacing: 5px; font-size: 10px; margin-bottom: 20px; opacity: 0.6;">TABRIKNOMA</p>
        
        <div class="profile-container">
            <div class="profile-ring"></div>
            <div class="profile-wrapper">
                <img src="Intizor opa.jpg" alt="Intizor Opa" class="profile-img">
            </div>
        </div>

        <h1>Intizor</h1>
        <p class="subtitle">Maktab Direktori</p>

        <p class="main-wish" id="wish-text"></p>

        <div class="grid">
            <div class="card"><span>🏆</span> Muvaffaqiyat yo'lingiz doim ochiq bo'lsin.</div>
            <div class="card"><span>❤️</span> Oilaviy baxt va xotirjamlik hamrohingiz bo'lsin.</div>
        </div>

        <div class="btn-box">
            <button class="btn" onclick="celebrate()">Salyut otish ✨</button>
            <button class="btn btn-heart" onclick="sendLove()">Mehr yuborish ❤️</button>
        </div>
    </div>

    <script>
        /* --- BACKGROUND PARTICLES --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            draw() {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.3)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                this.y -= 0.3; if(this.y < 0) this.y = canvas.height;
            }
        }
        function createParticles() { for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); createParticles(); animate();

        /* --- 3. TYPEWRITER EFFECT --- */
        const fullText = "Hurmatli Intizor muallima! Bugungi unutilmas kuningizda 269-maktab jamoasi sizga dunyodagi eng ezgu tilaklarni tilab qoladi. Sizning rahbarligingiz ostida maktabimiz nurli kelajak sari odimlamoqda.";
        let index = 0;
        function typeWriter() {
            if (index < fullText.length) {
                document.getElementById("wish-text").innerHTML += fullText.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        /* --- 2. SALYUT EFFECT --- */
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d4af37', '#f3e5ab', '#ffffff']
            });
        }

        /* --- 4. YURAKCHALAR YOMG'IRI (Butun ekran) --- */
        function sendLove() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d4d', '#ff0000']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d4d', '#ff0000']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
